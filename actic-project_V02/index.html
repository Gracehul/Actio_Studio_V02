<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIC — Choreographing Systems</title>
    <meta name="description" content="Portfolio of Duc Bao Bui — Exploring movement as input and system behavior as response.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>


<body class="index-page">
        <header class="site-header">
            <div class="site-header__logo">
                <a href="index.html" class="site-header__logo-link resonanz-element kinetic-morph">ACTIC</a>
            </div>

            <nav class="site-nav" aria-label="Main Navigation">
                <ul class="site-nav__list">
                    <li><a href="#work" class="site-nav__link">Wark</a></li>
                    <li><a href="#about" class="site-nav__link">About</a></li>
                    <li><a href="#contact" class="site-nav__link">Contact</a></li>
                </ul>
            </nav>
        </header>

    <main id="main-content">
        <section class="hero">
            <!-- Three.js kinetic object lives here -->
            <canvas class="hero-kinetic-canvas" aria-hidden="true"></canvas>

            <div class="hero-card resonanz-element">
                <div class="hero-card__inner">
                    <div class="hero-card__label">Choreographing Systems</div>
                    <div class="hero-card__statement">
                        <p>Movement as input.<br>Systems as response.</p>
                    </div>
                    <div class="hero-card__mark">ACTIC</div>
                </div>
            </div>

            <div class="hero__media resonanz-element">
                <img src="img/Stil-02.png" alt="Abstract motion capture visualization" class="hero__image kinetic-morph">
            </div>
        </section>

        <section id="work" class="work-section">
            <h2 class="work-section__title">Selected Work</h2>
            
            <div class="work-grid">
                 <a href="project.html" class="work-item">
                    <article>
                        <figure class="work-item__figure">
                            <img src="img/work-01.png" alt="Visualizing Movement as Data Practice" class="work-item__image">
                                <figcaption class="work-item__caption">
                                    <h3>Movement as Data Practice</h3>
                                    <span>Research — 2026</span>
                                </figcaption>
                        </figure>
                    </article>
                 </a>

                    <article class="work-item">
                        <figure class="work-item__figure">
                            <img src="img/work-02.png" alt="Experimental motion study" class="work-item__image">
                                <figcaption class="work-item__caption">
                                    <h3>Motion Study</h3>
                                    <span>Exploration</span>
                                </figcaption>
                         </figure>
                     </article>

                      <article class="work-item">
                         <figure class="work-item__figure">
                              <img src="img/work-03.png" alt="Visual system experiment" class="work-item__image">
                                 <figcaption class="work-item__caption">
                                   <h3>Visual System</h3>
                                   <span>Prototype</span>
                              </figcaption>
                          </figure>
                      </article>
            </div>
        </section>

        <section id="about" class="about-section">
            <h2 class="about-section__title">About</h2>
            <div class="about-section__content">
                <div class="about-section__image">
                    <img src="img/Portrait.jpeg" alt="Portrait of Duc Bao Bui" class="about-section__portrait">
                    <img src="img/Portrait-Pointcloud.png" alt="Pointcloud Analysis" class="pointcloud-overlay">
                </div>

                <div class="about-card"> 
                    <div class="about-card__inner">
                        <p class="body-text">
                             <strong>Duc Bao Bui</strong> is a designer and researcher working at the intersection of movement and digital systems.
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>

        <footer id="contact" class="site-footer">
                <div class="site-footer__info">
                        <p>Duc Bao Bui — <a href="mailto:bui@th-brandenburg.de">bui@th-brandenburg.de</a> — © 2026</p>
                </div>
        </footer>

    <script type="module" src="js/kinetic-object.js"></script>
    <script src="js/script.js" defer></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const workSection = document.querySelector('.work-section');

        if (!workSection) return;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('in-view');
                }
            });
        }, {
            threshold: 0.2
        });

        observer.observe(workSection);
    });
    </script>
    <svg style="position: absolute; width: 0; height: 0;">
    <filter id="turbulenceFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    </svg>
</body>

</html>
